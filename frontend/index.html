<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VSM Digital Twin — IE Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Syne:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#0b0f14;
  color:#e5e7eb;
}
.container{
  display:grid;
  grid-template-columns:260px 1fr 320px;
  height:100vh;
}
.sidebar{
  background:#111827;
  padding:16px;
  border-right:1px solid #1f2937;
}
.right{
  border-left:1px solid #1f2937;
  display:flex;
  flex-direction:column;
}
h3{
  font-family:Syne;
}
.slider{
  width:100%;
}
.main{
  position:relative;
}
.kpis{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:#111827;
  border-top:1px solid #1f2937;
}
.kpi{
  flex:1;
  padding:10px;
  text-align:center;
}
.chat{
  flex:1;
  overflow:auto;
  padding:10px;
}
.msg{
  margin-bottom:10px;
  font-size:13px;
}
.ai{
  background:#1f2937;
  padding:10px;
  border-radius:6px;
}
.user{
  text-align:right;
}
input{
  width:100%;
  padding:10px;
  border:none;
  background:#1f2937;
  color:white;
}
button{
  width:100%;
  padding:10px;
  background:#10b981;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="sidebar">
  <h3>Parameters</h3>

  Demand
  <input type="range" min="50" max="500" value="200" id="demand" class="slider">

  Shift Hours
  <input type="range" min="6" max="24" value="8" id="shift" class="slider">

  <br><br>
  <button onclick="runSimulation()">RUN SIM</button>
</div>

<!-- CENTER -->
<div class="main">
  <svg id="canvas" width="100%" height="100%"></svg>

  <div class="kpis">
    <div class="kpi">Lead Time<br><b id="lt">-</b></div>
    <div class="kpi">WIP<br><b id="wip">-</b></div>
    <div class="kpi">Throughput<br><b id="tp">-</b></div>
    <div class="kpi">OEE<br><b id="oee">-</b></div>
  </div>
</div>

<!-- RIGHT -->
<div class="right">
  <div class="chat" id="chat"></div>
  <input id="chat-input" placeholder="Ask about system...">
  <button onclick="sendMessage()">Ask Copilot</button>
</div>

</div>

<script>

// -------- DATA --------
const steps = [
  {name:"Stamping", ct:28, oee:82, wip:12},
  {name:"Welding", ct:35, oee:75, wip:18},
  {name:"Painting", ct:22, oee:88, wip:8},
  {name:"Assembly", ct:40, oee:91, wip:14},
  {name:"Inspection", ct:15, oee:95, wip:5}
];

let sim = null;

// -------- SIMULATION --------
function runSimulation(){
  const demand = +document.getElementById("demand").value;
  const shift = +document.getElementById("shift").value;

  const shift_s = shift*3600;
  const takt = shift_s/demand;

  const eff = steps.map(s=>s.ct/(s.oee/100));
  const max = Math.max(...eff);
  const idx = eff.indexOf(max);
  const bottleneck = steps[idx];

  const throughput = Math.min(Math.floor(shift_s/max), demand);
  const wip = steps.reduce((a,s)=>a+s.wip,0);
  const lt = wip/throughput;

  const avgOEE = Math.round(steps.reduce((a,s)=>a+s.oee,0)/steps.length);

  sim = {takt, throughput, wip, lt, bottleneck, avgOEE};

  updateUI();
  draw();
  addMsg("ai","Simulation complete. Ask Copilot for analysis.");
}

// -------- UI --------
function updateUI(){
  document.getElementById("lt").innerText = sim.lt.toFixed(2)+" d";
  document.getElementById("wip").innerText = sim.wip;
  document.getElementById("tp").innerText = sim.throughput;
  document.getElementById("oee").innerText = sim.avgOEE+"%";
}

// -------- DRAW --------
function draw(){
  const svg = document.getElementById("canvas");
  svg.innerHTML = "";

  steps.forEach((s,i)=>{
    const x = 100 + i*120;
    const y = 150;

    svg.innerHTML += `
      <rect x="${x}" y="${y}" width="80" height="60" fill="#1f2937"/>
      <text x="${x+40}" y="${y+20}" fill="white" text-anchor="middle">${s.name}</text>
      <text x="${x+40}" y="${y+40}" fill="#9ca3af" text-anchor="middle">${s.ct}s</text>
    `;
  });
}

// -------- CHAT + BACKEND --------
function addMsg(type,text){
  const div = document.createElement("div");
  div.className = "msg "+type;
  div.innerHTML = text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 99999;
}

async function sendMessage(){
  const input = document.getElementById("chat-input");
  const text = input.value.trim();
  if(!text) return;

  input.value="";
  addMsg("user",text);

  try{
    const res = await fetch("https://YOUR-RENDER-URL/api/chat", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        model:"mistralai/mistral-7b-instruct",
        messages:[
          {
            role:"system",
            content:"You are an Industrial Engineering expert analyzing VSM systems."
          },
          {
            role:"user",
            content:`${text}
            
Context:
${sim ? JSON.stringify(sim) : "No simulation yet"}
            `
          }
        ]
      })
    });

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || "No response";

    addMsg("ai",reply);

  }catch(e){
    addMsg("ai","Backend not reachable.");
  }
}

// INIT
draw();

</script>

</body>
</html>
